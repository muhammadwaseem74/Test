<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#0f172a;
  color:#e2e8f0;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:60px 20px;
}

h1 {
  font-size:40px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  -webkit-background-clip:text;
  color:transparent;
}

p {
  color:#94a3b8;
  line-height:1.7;
  margin-bottom:20px;
}

.team {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:40px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.card h3 {
  margin-top:10px;
}

.back {
  display:inline-block;
  margin-top:40px;
  padding:10px 20px;
  background:linear-gradient(90deg,#38bdf8,#6366f1);
  color:white;
  text-decoration:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
  <h1>About Us</h1>
  <p>We build fast, modern, and scalable websites focused on performance and user experience.</p>
  <p>Our mission is to deliver clean design with powerful functionality.</p>

  <div class="team">
    <div class="card">
      <h3>Waseem</h3>
      <p>Developer</p>
    </div>
    <div class="card">
      <h3>Team Member</h3>
      <p>Designer</p>
    </div>
    <div class="card">
      <h3>Team Member</h3>
      <p>SEO Expert</p>
    </div>
  </div>

  <a href="index.html" class="back">← Back to Home</a>
</div>

</body>
</html>
